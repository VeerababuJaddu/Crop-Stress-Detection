{% extends 'base.html' %}

{% load static %}

{% block hero %}
<link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">

<div class="container-mt-5 space">
    <h2 class="form-title">User Login</h2>
    <p class="text-center form-subtitle">Log in to access your account.</p>

    {% if messages %}
    <div class="message-container">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
    <form method="POST" action="userLoginCheck" class="custom-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="username">Username :</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password :</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="custom-btn">Login</button>
        
        <div class="text-center mt-3">
            <p class="form-footer">Don't have an account? <a href="userRegister" class="form-link">Sign Up</a></p>
        </div>
    </form>
</div>
{% endblock %}
